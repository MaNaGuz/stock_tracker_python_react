version: "3.9"

services:
  backend:
    build:
      context: ./py
    container_name: flask_backend
    volumes:
      - ./py/data:/opt/store/data
    expose:
      - "8080"
    environment:
      PORT: "8080"

  frontend:
    build:
      context: ./react
    container_name: react_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    environment:
      BACKEND_URL: "http://backend:8080"