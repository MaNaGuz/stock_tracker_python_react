version: "3.9"

services:
  backend:
    build:
      context: ./py
    container_name: flask_backend
    volumes:
      - ./py/data:/opt/store/data
    expose:
      - "5000"

  frontend:
    build:
      context: ./react
    container_name: react_frontend
    ports:
      - "80:80"
    depends_on:
      - backend